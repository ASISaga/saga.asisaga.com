# theme: jekyll-theme-minimal
title: ASI Saga
description: The ASI Saga blog — exploring the sacred journey toward Artificial Superintelligence
ignore_theme_config: true

sass:
  load_paths:
    - _sass
    - assets/css

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme
  - jekyll-seo-tag

remote_theme: ASISaga/theme.asisaga.com

# Exclude specific directories and files from being processed by Jekyll
exclude:
  - docs/
  - LICENSE
  - README.md
  - website_structure.json

# The defaults section allows you to set default values for certain variables
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: ASI Saga
